<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BMR & TDEE 计算器</title>
  <style>
    :root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--accent:#22c55e;--danger:#ef4444;--border:#1f2937}
    *{box-sizing:border-box}body{margin:0; font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Noto Sans, Helvetica, Arial; background:linear-gradient(135deg,#0f172a,#0b1220);} .wrap{max-width:980px;margin:48px auto;padding:24px}
    .card{background:rgba(17,24,39,.9);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
    h1{margin:0 0 6px;color:var(--text);font-size:28px;letter-spacing:.3px}
    p.sub{margin:0 0 18px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .col-6{grid-column:span 6}.col-4{grid-column:span 4}.col-3{grid-column:span 3}.col-12{grid-column:span 12}
    label{display:block;color:var(--muted);font-size:13px;margin:6px 0}
    input, select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:#0b1220;color:var(--text);outline:none}
    input:focus, select:focus{border-color:#334155}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .seg{display:flex;background:#0b1220;border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .seg input{display:none}
    .seg label{padding:10px 14px;color:var(--muted);cursor:pointer;border-right:1px solid var(--border);user-select:none}
    .seg label:last-child{border-right:none}
    .seg input:checked + label{background:#111827;color:var(--text);outline:2px solid #334155}
    .box{background:#0b1220;border:1px solid var(--border);border-radius:12px;padding:14px}
    .pill{display:inline-block;padding:6px 10px;border:1px solid var(--border);border-radius:999px;color:var(--muted);font-size:12px}
    .out{display:flex;gap:12px;flex-wrap:wrap}
    .kpi{flex:1 1 250px; background:#0b1220;border:1px solid var(--border);border-radius:14px;padding:16px}
    .kpi h3{margin:0;color:var(--muted);font-size:13px}
    .kpi .val{font-size:28px;color:var(--text);margin-top:6px}
    .help{color:var(--muted);font-size:12px}
    .foot{color:var(--muted);font-size:12px;margin-top:8px}
    .warn{color:var(--danger)}
    .ok{color:var(--accent)}
    .hr{height:1px;background:linear-gradient(90deg,transparent,#1f2937,transparent);margin:14px 0}
    @media (max-width:720px){.col-6,.col-4,.col-3{grid-column:span 12}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>BMR & TDEE 计算器</h1>
      <p class="sub">输入你的数据，实时计算基础代谢率（BMR）与每日总消耗（TDEE）。</p>

      <div class="grid">
        <div class="col-12">
          <label>性别</label>
          <div class="seg" role="tablist" aria-label="gender">
            <input type="radio" id="sex-m" name="sex" value="male" checked><label for="sex-m">男性</label>
            <input type="radio" id="sex-f" name="sex" value="female"><label for="sex-f">女性</label>
          </div>
        </div>

        <div class="col-4">
          <label>体重（kg）</label>
          <input id="weight" type="number" min="20" max="300" step="0.1" value="70">
        </div>
        <div class="col-4">
          <label>身高（cm）</label>
          <input id="height" type="number" min="120" max="230" step="0.5" value="175">
        </div>
        <div class="col-4">
          <label>年龄（岁）</label>
          <input id="age" type="number" min="10" max="100" step="1" value="30">
        </div>

        <div class="col-6">
          <label>体脂率（%）<span class="help">（可选，用于 Katch–McArdle）</span></label>
          <input id="bodyfat" type="number" min="3" max="70" step="0.1" placeholder="例如 20">
        </div>

        <div class="col-6">
          <label>活动水平</label>
          <select id="activity">
            <option value="1.2">久坐：1.2</option>
            <option value="1.375">轻度活动（1–3 天/周）：1.375</option>
            <option value="1.55" selected>中度活动（3–5 天/周）：1.55</option>
            <option value="1.725">高度活动（6–7 天/周）：1.725</option>
            <option value="1.9">极高活动（体力劳动/双训）：1.9</option>
          </select>
        </div>

        <div class="col-12">
          <label>选择公式</label>
          <div class="seg" role="tablist" aria-label="formula">
            <input type="radio" id="f-msj" name="formula" value="msj" checked><label for="f-msj">Mifflin–St Jeor</label>
            <input type="radio" id="f-hb" name="formula" value="hb"><label for="f-hb">Harris–Benedict</label>
            <input type="radio" id="f-km" name="formula" value="km"><label for="f-km">Katch–McArdle</label>
          </div>
          <div id="bfWarn" class="help"></div>
        </div>

        <div class="col-12 hr"></div>

        <div class="col-12 out">
          <div class="kpi">
            <h3>基础代谢（BMR）</h3>
            <div id="bmr" class="val">— kcal/日</div>
            <div class="help">基于所选公式计算。</div>
          </div>
          <div class="kpi">
            <h3>每日总消耗（TDEE）</h3>
            <div id="tdee" class="val">— kcal/日</div>
            <div class="help">TDEE = BMR × 活动系数。</div>
          </div>
          <div class="kpi">
            <h3>建议热量区间</h3>
            <div class="val"><span id="cut">—</span> / <span id="gain">—</span></div>
            <div class="help">减脂约 TDEE−10~20%；增肌约 TDEE+5~15%。</div>
          </div>
        </div>

        <div class="col-12 foot">提示：数值为估算，真实消耗受肌肉量、睡眠、激素、温度等影响。请结合体重变化做 2–4 周动态校准。</div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id)=>document.getElementById(id);
    const els = {
      sex: ()=>document.querySelector('input[name="sex"]:checked').value,
      formula: ()=>document.querySelector('input[name="formula"]:checked').value,
      weight: $('weight'), height: $('height'), age: $('age'), bodyfat: $('bodyfat'), activity: $('activity'),
      bmr: $('bmr'), tdee: $('tdee'), cut: $('cut'), gain: $('gain'), bfWarn: $('bfWarn')
    };

    function clamp(v, min, max){return Math.min(Math.max(v, min), max)}

    function calc(){
      const sex = els.sex();
      const f = els.formula();
      const w = clamp(parseFloat(els.weight.value)||0, 20, 300);
      const h = clamp(parseFloat(els.height.value)||0, 120, 230);
      const a = clamp(parseInt(els.age.value)||0, 10, 100);
      const act = parseFloat(els.activity.value)||1.2;
      const bf = parseFloat(els.bodyfat.value);

      let bmr = 0; let warn = '';

      if(f === 'msj'){
        bmr = (10*w) + (6.25*h) - (5*a) + (sex==='male'?5:-161);
      } else if(f === 'hb'){
        if(sex==='male') bmr = 88.362 + 13.397*w + 4.799*h - 5.677*a;
        else bmr = 447.593 + 9.247*w + 3.098*h - 4.330*a;
      } else if(f === 'km'){
        if(isFinite(bf)){
          const lbm = w * (1 - bf/100);
          bmr = 370 + 21.6 * lbm;
          if(bf<3 || bf>60) warn = '体脂率超出常见范围，结果可能偏差。';
        } else {
          warn = 'Katch–McArdle 需要体脂率，请先输入。';
          // 回退到 MSJ
          bmr = (10*w) + (6.25*h) - (5*a) + (sex==='male'?5:-161);
        }
      }

      const tdee = bmr * act;
      const cutLow = tdee * 0.9, cutHigh = tdee * 0.8; // 显示 10–20% 赤字
      const gainLow = tdee * 1.05, gainHigh = tdee * 1.15; // 显示 5–15% 盈余

      const fmt = (x)=> isFinite(x)? Math.round(x).toLocaleString('zh-CN'): '—';

      els.bmr.textContent = fmt(bmr) + ' kcal/日';
      els.tdee.textContent = fmt(tdee) + ' kcal/日';
      els.cut.textContent = fmt(cutHigh) + ' ~ ' + fmt(cutLow) + ' ↓';
      els.gain.textContent = fmt(gainLow) + ' ~ ' + fmt(gainHigh) + ' ↑';
      els.bfWarn.innerHTML = warn? `<span class="warn">${warn}</span>` : '';
    }

    document.addEventListener('input', calc);
    document.addEventListener('change', calc);
    window.addEventListener('DOMContentLoaded', calc);
  </script>
</body>
</html>
